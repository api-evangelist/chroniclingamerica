    contact:
      - FN: Library of Congress
        url: https://www.loc.gov/about/contact-us/
  - aid: chroniclingamerica:chronicling-america-titles-api
    name: Chronicling America Titles API
    description: >-
      The Titles API exposes bibliographic metadata for every newspaper title in the Chronicling
      America collection. Callers can retrieve the full title list, look up a specific title by LCCN
      (Library of Congress Control Number), list all digitized issues for a title, and retrieve
      individual batch records. Responses are available in JSON and Atom formats.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://chroniclingamerica.loc.gov/about/api/
    baseURL: https://chroniclingamerica.loc.gov
    tags:
      - Newspapers
      - Titles
      - LCCN
      - Bibliographic
      - Metadata
    properties:
      - type: Documentation
        url: https://chroniclingamerica.loc.gov/about/api/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/chroniclingamerica/refs/heads/main/openapi/chroniclingamerica-openapi.yml
      - type: TermsOfService
        url: https://www.loc.gov/legal/
    contact:
      - FN: Library of Congress
        url: https://www.loc.gov/about/contact-us/
  - aid: chroniclingamerica:chronicling-america-pages-api
    name: Chronicling America Pages API
    description: >-
      The Pages API provides access to individual newspaper page records including OCR text, IIIF image
      service URLs, PDF downloads, and JP2 image files. Pages are addressed by LCCN, date, edition,
      and sequence number. OCR text can be retrieved as plain text or coordinates. The underlying image
      files are available in JP2, PDF, and TIFF formats hosted on LOC storage services.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://chroniclingamerica.loc.gov/about/api/
    baseURL: https://chroniclingamerica.loc.gov
    tags:
