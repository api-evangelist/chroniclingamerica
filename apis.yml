apis:
  - aid: chroniclingamerica:chronicling-america-search-api
    name: Chronicling America Search API
    description: >-
      The Chronicling America Search API provides full-text search across over 20 million historic
      American newspaper pages digitized under the National Digital Newspaper Program. Callers can
      search by keyword, date range, state, newspaper title (LCCN), and page-level fields. Responses
      are available in JSON or Atom format. No authentication or API key is required.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://chroniclingamerica.loc.gov/about/api/
    baseURL: https://chroniclingamerica.loc.gov
    tags:
      - Newspapers
      - Search
      - Historical
      - OCR
      - Full-Text
    properties:
      - type: Documentation
        url: https://chroniclingamerica.loc.gov/about/api/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/chroniclingamerica/refs/heads/main/openapi/chroniclingamerica-openapi.yml
      - type: TermsOfService
