aid: chroniclingamerica
name: Chronicling America
description: >-
  Chronicling America is a Library of Congress initiative providing free public access to a searchable
  database of historic American newspaper pages from 1770 to 1963. The platform hosts over 20 million
  digitized newspaper pages from hundreds of US newspapers contributed by institutions in the National
  Digital Newspaper Program (NDNP). The API exposes search, title, issue, batch, and OCR text endpoints
  with no authentication required, returning responses in JSON and Atom feed formats.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/chroniclingamerica/refs/heads/main/apis.yml
