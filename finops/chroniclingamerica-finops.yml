description: >-
  FinOps framework definition for the Chronicling America API. All Chronicling America services are
  free US federal government services with zero direct cost to consumers. FinOps considerations for
  consuming organizations focus on internal infrastructure costs incurred when storing, processing,
  and serving the digitized newspaper content retrieved via the API.
principles:
  - name: Visibility
    description: Track internal compute, storage, and egress costs generated by Chronicling America data consumption even though the API itself is free.
  - name: Allocation
    description: Tag all storage, compute, and egress costs by the project, team, or feature consuming Chronicling America data so internal chargebacks are accurate.
  - name: Optimization
    description: Use LOC-provided bulk data packages rather than repeated API calls to minimize internal compute costs and API rate-limit risk.
  - name: Accountability
    description: Assign budget owners for internal infrastructure supporting Chronicling America integrations; zero-cost APIs still generate infrastructure spend.
costModel:
  type: Free
  directCost: $0.00 per request
  notes: >-
    Chronicling America is a Library of Congress service funded by the US federal government through
    the National Digital Newspaper Program. There are no usage fees, subscription fees, or commercial
    licensing costs. No API key is required; access is completely open.
budgetConsiderations:
  - category: No Direct API Costs
    description: No budget allocation is required for Chronicling America API access.
    recommendation: No spend required for API access; allocate budget only for your own infrastructure.
  - category: Storage for Newspaper Images
    description: >-
      JP2 newspaper page images range from 2–30 MB each. The full Chronicling America collection
      contains over 20 million pages. Storing a significant fraction of the image collection locally
      requires substantial cloud object storage.
    recommendation: >-
      Estimate storage needs before bulk download. For text-focused applications, download only OCR
      text files (typically < 100 KB per page) rather than images. Consider LOC Labs bulk OCR
      packages which bundle all text data into compressed archives, dramatically reducing per-page
      transfer overhead.
  - category: Egress and Data Transfer
    description: >-
      Organizations downloading large volumes of page images or bulk OCR data will incur egress
      costs from their own cloud provider, depending on region and volume. LOC itself does not charge
      for bandwidth, but your cloud egress costs apply when storing or distributing the content.
    recommendation: >-
      Use LOC bulk data packages (available via S3-compatible access at LOC Labs) to leverage
      S3-to-S3 or S3-to-compute transfers at lower cost than pulling over the public internet from
      chroniclingamerica.loc.gov.
  - category: Compute for OCR and NLP Processing
    description: >-
      Many Chronicling America use cases involve NLP, entity extraction, or re-OCR over the
      newspaper text corpus. Processing 20 million pages at scale requires significant compute budget.
    recommendation: >-
      Use spot/preemptible instances for batch processing. Process incrementally by LOC batch
      ingestion date rather than re-processing the full corpus. Cache intermediate results (tokenized
      text, named entities) to avoid redundant computation.
  - category: No SLA or Uptime Guarantee
    description: >-
      Chronicling America has no published uptime SLA. The LOC web infrastructure has experienced
      periodic outages and Cloudflare-related access disruptions.
    recommendation: >-
      Cache metadata (title lists, batch manifests, issue indexes) locally and refresh weekly rather
      than querying on every request. Build retry logic and graceful degradation into any production
      application dependent on the API.
  - category: Copyright and Rights Review
    description: >-
      While most content in Chronicling America is in the public domain, some pages may contain
      third-party copyrighted material (advertisements, syndicated columns, wire photos). Legal
      review of rights for specific use cases may require staff time or legal counsel.
    recommendation: >-
      Consult LOC rights statements per title/issue. For commercial use cases, conduct a rights
      clearance review before redistribution of specific newspaper content.
optimization:
  - Use LOC Labs bulk OCR data packages for full-corpus text access instead of paginating the search API
  - Enumerate pages via /batches.json and batch manifests to discover all pages without search pagination
  - Cache the /newspapers.json title list and /lccn/{lccn}/issues.json manifests locally; refresh weekly
  - Download JP2 rather than TIFF where image fidelity needs are met by JP2 compression
  - Use the Atom feed format with date-range filters for incremental ingestion of newly added pages
  - For image-heavy workflows, consider LOC IIIF endpoints to request only the image region needed
compliance:
  - US federal government-produced metadata and page images are public domain; no copyright applies to LOC's own digitization work
  - Historic newspaper content may include third-party copyrighted material; evaluate rights per title
  - No data residency or sovereignty requirements apply to Chronicling America API consumers; data is publicly accessible globally
  - No PII is transmitted in Chronicling America API requests or responses
